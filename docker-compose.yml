services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi_income_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxi_income
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi_dev_pwd
    ports:
      - "5433:5432"
    volumes:
      - taxi_income_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi_income"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taxi_income_pg_data:
