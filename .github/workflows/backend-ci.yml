name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Unit tests
        working-directory: backend
        run: mvn -B -q test

      - name: Integration tests (Testcontainers requires Docker socket)
        working-directory: backend
        run: mvn -B -q verify -Pintegration
